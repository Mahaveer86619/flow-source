services:
  api:
    build: .
    container_name: flow-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "http://localhost:8000/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: flow-tunnel
    restart: always
    command: tunnel --protocol http2 --url http://api:8000
    depends_on:
      - api
